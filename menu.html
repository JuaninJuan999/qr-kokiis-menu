<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Menú digital Koky's - Comidas rápidas en Bucaramanga">
    <title>Koky's Menu - Comidas Rápidas</title>
    
    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="logo/favicon.png">
    <link rel="shortcut icon" type="image/png" href="logo/favicon.png">
    <link rel="apple-touch-icon" href="logo/favicon.png">
    
    <style>
                .menu-card {
                    background: #fff;
                    border-radius: 15px;
                    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
                    padding: 24px 20px 18px 20px;
                    display: flex;
                    flex-direction: column;
                    align-items: flex-start;
                    transition: transform 0.3s, box-shadow 0.3s;
                    position: relative;
                    min-height: 170px;
                }
                .menu-card:hover {
                    transform: translateY(-8px) scale(1.03);
                    box-shadow: 0 15px 35px rgba(0,0,0,0.22);
                }
                .menu-card h3 {
                    color: #ff6b35;
                    font-size: 1.25em;
                    margin-bottom: 8px;
                    font-weight: bold;
                }
                .menu-card p {
                    color: #636e72;
                    font-size: 1em;
                    margin-bottom: 12px;
                }
                .menu-card .price {
                    background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
                    color: #fff;
                    font-weight: bold;
                    font-size: 1.1em;
                    padding: 6px 18px;
                    border-radius: 30px;
                    align-self: flex-end;
                    margin-top: auto;
                    box-shadow: 0 2px 8px rgba(255,107,53,0.13);
                }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff6b35 0%, #ff8b3d 100%);
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        /* Header con logo - OCUPA TODO EL ANCHO */
        header {
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            padding: 0;
            position: relative;
            overflow: hidden;
        }

        .logo-container {
            width: 100%;
            height: auto;
            display: block;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        /* Botón de WhatsApp Flotante con ICONO SVG */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #25D366;
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.5);
            cursor: pointer;
            z-index: 1000;
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: pulse 2s infinite;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 30px rgba(37, 211, 102, 0.7);
        }

        .whatsapp-float svg {
            width: 40px;
            height: 40px;
            fill: white;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 8px 20px rgba(37, 211, 102, 0.5);
            }
            50% {
                box-shadow: 0 8px 30px rgba(37, 211, 102, 0.8);
            }
        }

        /* Botón de pedido principal */
        .order-button {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: white;
            padding: 18px 40px;
            font-size: 1.3em;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.4);
            text-decoration: none;
            margin: 20px auto;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .order-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(37, 211, 102, 0.6);
        }

        .order-button svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .order-section {
            text-align: center;
            padding: 30px 20px;
            background: #f8f9fa;
        }

        /* Contenido del menú */
        .content {
            padding: 30px 20px;
        }

        .promo-banner {
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
            color: white;
            font-size: 1.4em;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(255, 107, 53, 0.4);
        }

        .section-title {
            color: #ff6b35;
            font-size: 1.8em;
            margin: 30px 0 20px 0;
            padding-left: 15px;
            border-left: 5px solid #ff6b35;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .menu-item {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            background: white;
        }

        .menu-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
        }

        .menu-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.3s ease;
        }

        .menu-item:hover img {
            transform: scale(1.05);
        }

        footer {
            text-align: center;
            padding: 30px 20px;
            background: #2d3436;
            color: white;
        }

        footer p {
            margin: 10px 0;
            font-size: 1.1em;
        }

        footer a {
            color: #25D366;
            text-decoration: none;
            font-weight: bold;
        }

        /* Modal para ver imágenes grandes */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.95);
            padding: 20px;
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            animation: zoom 0.3s;
        }

        @keyframes zoom {
            from {transform: scale(0.8); opacity: 0;}
            to {transform: scale(1); opacity: 1;}
        }

        .close-modal {
            position: absolute;
            top: 30px;
            right: 45px;
            color: white;
            font-size: 50px;
            font-weight: bold;
            cursor: pointer;
            z-index: 2001;
        }

        .close-modal:hover {
            color: #ff6b35;
        }

        @media (max-width: 768px) {
            .menu-grid {
                grid-template-columns: 1fr;
            }
            
            .whatsapp-float {
                width: 60px;
                height: 60px;
                bottom: 20px;
                right: 20px;
            }

            .whatsapp-float svg {
                width: 32px;
                height: 32px;
            }

            .order-button {
                font-size: 1.1em;
                padding: 15px 30px;
            }
        }

        /* Optimización para impresión de QR */
        @media print {
            .whatsapp-float {
                display: none;
            }
            body {
                background: white;
            }
        }
    </style>
</head>
<body>

    <!-- Botón flotante de WhatsApp CON ICONO SVG -->
    <a href="https://wa.me/573025683367?text=Hola!%20Quiero%20hacer%20un%20pedido%20del%20menú%20Kokiis" 
       class="whatsapp-float"

        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

    <!-- Modal para ver imágenes grandes -->
    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modalImage" alt="Menú ampliado">
    </div>

    <script>
        // Renderizar menú cargando pinchos.json dinámicamente
        async function renderMenu() {
            // Menú base sin pinchos
            const defaultMenu = [
                {
                    categoria: "Salchipapas y Choripapas",
                    productos: [
                        { nombre: "Salchipapa Sencillo", descripcion: "Papa francesa, salchicha tradicional", precio: "15000" },
                        { nombre: "Salchipapa Especial", descripcion: "Papa en salsa, salchicha tradicional", precio: "20000" },
                        { nombre: "Choripapa Sencillo", descripcion: "Papa francesa, chorizo ahumado", precio: "18000" },
                        { nombre: "Choripapa Especial", descripcion: "Papa en salsa, salchicha, ahumado mozzarella, sal a gusto", precio: "22000" }
                    ]
                },
                // Pinchos se cargará desde pinchos.json
                {
                    categoria: "Picadas",
                    productos: [
                        { nombre: "Picada Personal", descripcion: "Carne, pollo, salchicha, papa francesa, queso rallado, salsas, vegetales frescos", precio: "20000" },
                        { nombre: "Picada Grande", descripcion: "Carne, pollo, salchicha, papa francesa, queso, chorizo, verduras frescas, mozzarella", precio: "40000" }
                    ]
                },
                {
                    categoria: "Perros Calientes",
                    productos: [
                        { nombre: "Perro Tradicional", descripcion: "Pan brioche, salchicha, papa", precio: "15000" },
                        { nombre: "Perro Especial Pollo", descripcion: "En salsa tártara, papa, cebolla", precio: "20000" },
                        { nombre: "Perro Ranchero Chorizo", descripcion: "Queso ahumado, tocineta ahumada, cebolla, grillet", precio: "25000" },
                        { nombre: "Perro Super KOKY's Carne", descripcion: "Queso en salsa tártara, papa rápida, tocineta con chorizo, papa francesa", precio: "30000" }
                    ]
                },
                {
                    categoria: "Hamburguesas",
                    productos: [
                        { nombre: "Hamburguesa Tradicional", descripcion: "Mozza 125g, jamón ahumado, broche", precio: "18000" },
                        { nombre: "Carne 125g Mix Tártara", descripcion: "Jamón ahumado, queso mozzarella, papa", precio: "22000" },
                        { nombre: "Carne 125g Especial", descripcion: "Especial de la casa", precio: "27000" },
                        { nombre: "Chorizo Doble", descripcion: "2 Carne 125g, tocineta ahumada", precio: "27000" },
                        { nombre: "Chorizo Fresco Pan KOKY's", descripcion: "Tocinetas 125g, filete de pollo, mozzarella, chorizo, pollo en salsa tártara", precio: "32000" }
                    ]
                },
                {
                    categoria: "Promociones",
                    productos: [
                        { nombre: "Las Hermanas", descripcion: "1 Hamburguesa Super KOKY's + 1 Hamburguesa especial", precio: "50000" },
                        { nombre: "2 Perros Rancheros + Gaseosa Mini", descripcion: "Combo especial", precio: "40000" },
                        { nombre: "2 Salchipapas Especiales + 2 Gaseosas Mini", descripcion: "De Locura", precio: "35000" }
                    ]
                }
            ];

            // Intentar cargar pinchos.json
            let pinchosCategoria = null;
            try {
                const resp = await fetch('pinchos.json');
                if (resp.ok) {
                    const pinchos = await resp.json();
                    // Si el archivo es un array, tomar el primero, si es objeto, usarlo directo
                    if (Array.isArray(pinchos)) {
                        pinchosCategoria = pinchos.find(c => c.categoria && c.categoria.toLowerCase().includes('pincho'));
                    } else if (pinchos.categoria && pinchos.productos) {
                        pinchosCategoria = pinchos;
                    }
                }
            } catch (e) {
                // Si falla, no mostrar pinchos
                pinchosCategoria = null;
            }

            // Construir menú final
            let menu = [...defaultMenu];
            if (pinchosCategoria) {
                // Insertar pinchos después de la primera categoría
                menu.splice(1, 0, pinchosCategoria);
            }

            const cont = document.getElementById('menu-dinamico');
            cont.innerHTML = '';
            // Promociones primero si existe
            const promos = menu.find(c => c.categoria.toLowerCase().includes('promo'));
            if (promos) {
                cont.innerHTML += `<div class='promo-banner'>⭐ ¡PROMOCIONES ESPECIALES! ⭐</div><div class='menu-grid'>${promos.productos.map(p => `<div class='menu-card'><h3>${p.nombre}</h3><p>${p.descripcion}</p><span class='price'>$${Number(p.precio).toLocaleString('es-CO')}</span></div>`).join('')}</div>`;
            }
            // Otras categorías
            menu.filter(c => !c.categoria.toLowerCase().includes('promo')).forEach(cat => {
                cont.innerHTML += `<h2 class='section-title'>${cat.categoria}</h2><div class='menu-grid'>${cat.productos.map(p => `<div class='menu-card'><h3>${p.nombre}</h3><p>${p.descripcion}</p><span class='price'>$${Number(p.precio).toLocaleString('es-CO')}</span></div>`).join('')}</div>`;
            });
        }
        renderMenu();
    </script>
</body>
